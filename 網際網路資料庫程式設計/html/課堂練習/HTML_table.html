<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML_table</title>
  </head>

  <body>
    <style>
      table {
        border-collapse: collapse;
        font-size: 18px;
        width: 900px;
        height: 225px;
      }
      table tr,
      table td {
        border: 1px solid black;
      }
      .a_style {
        background-color: #b3ffff;
        text-align: center;
      }
      .b_style {
        background-color: #ffc0cb;
        text-align: left;
      }
    </style>

    <table>
      <tr class="a_style">
        <td rowspan="2"></td>
        <td colspan="2"><b>上學期</b></td>
        <td colspan="2"><b>下學期</b></td>
      </tr>
      <tr class="a_style">
        <td>男生</td>
        <td>女生</td>
        <td>男生</td>
        <td>女生</td>
      </tr>
      <tr class="a_style">
        <td>資工系</td>
        <td>1000</td>
        <td>500</td>
        <td>1100</td>
        <td>600</td>
      </tr>
      <tr class="a_style">
        <td>資管系</td>
        <td>800</td>
        <td>600</td>
        <td>900</td>
        <td>650</td>
      </tr>
      <tr class="b_style">
        <td colspan="5">註：以上資料僅供參考</td>
      </tr>
    </table>
  </body>
</html>
