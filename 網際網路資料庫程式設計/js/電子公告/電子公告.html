<!doctype html>
<!-- saved from url=(0065)https://webcourse.ncue.edu.tw/Web/JavaScript/jquery_practice.html -->
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>電子公告</title>
    <script src="./電子公告_files/jquery-3.6.0.js.下載"></script>
    <link rel="stylesheet" href="./電子公告_files/bootstrap.min.css" />
    <link rel="stylesheet" href="./電子公告_files/bootstrap-theme.min.css" />
    <link rel="stylesheet" href="./電子公告_files/all.css" />
    <script src="./電子公告_files/bootstrap.min.js.下載"></script>
    <script>
      $(function () {
        // 本校教職員
        function toggleDept() {
          if ($("input[name='doc_to[]'][value='1']").is(":checked")) {
            $("#div_dept").show();
          } else {
            $("#div_dept").hide();
          }
        }
        // 全選/全不選功能
        function toggleSelectAll(selector, target) {
          $(selector).on("change", function () {
            $(target).prop("checked", $(this).is(":checked"));
          });
        }
        // 新增附檔
        function addUpload() {
          $("#div_upload").append(
            `<div><button type="button" class="btn btn-danger btn-xs" data-placement="right" title="移除"><i class="fa fa-times" aria-hidden="true"></i></button><input type="file" name="doc_upload[]" style="display: inline-block"/></div>`,
          );
        }
        // 變更字體大小
        function textSize() {
          if ($("body").css("font-size") === "14px") {
            $("body").css("font-size", "18px");
          } else {
            $("body").css("font-size", "14px");
          }
        }
        // 顯示表單內容
        function showTable() {
          $("#table2").show();
          $("#doc_from_s").text($("#doc_from").text());
          $("#doc_username_s").text($("#doc_username option:selected").text());
          $("#doc_type_s").text(
            $("input[name='doc_type']:checked").parent().text().trim(),
          );

          const docToVals = [];
          $("input[name='doc_to[]']:checked").each(function () {
            docToVals.push($(this).parent().text().trim());
          });
          $("#doc_to_s").html(docToVals.join("<br>"));

          $("#doc_title_s").text($("#doc_title").val());
          $("#doc_detail_s").html(
            $("#doc_detail").val().replace(/\n/g, "<br>"),
          );

          const deptVals = [];
          $("input[name='dept[]']:checked").each(function () {
            deptVals.push($(this).val().substring(3));
          });
          $("#doc_dept_s").html(deptVals.join("<br>"));

          const uploadVals = [];
          $("input[name='doc_upload[]']").each(function () {
            const fileName = $(this).val().split("\\").pop();
            if (fileName) {
              uploadVals.push(fileName);
            }
          });
          $("#doc_upload_s").html(uploadVals.join("<br>"));
        }
        // 按鈕功能
        toggleSelectAll("#select_all_1", ".d1");
        toggleSelectAll("#select_all_2", ".d2");
        $("input[name='doc_to[]'][value='1']").on("change", toggleDept);
        toggleDept();
        $("#div_upload").on("click", "button", function () {
          $(this).parent().remove();
        });
        $("#btn_append").on("click", addUpload);
        $("#btn_css").on("click", textSize);
        $("#btn_show").on("click", showTable);
      });
    </script>
    <style>
      .td1 {
        font-weight: bold;
        background-color: #ecf9ff;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="panel panel-primary">
        <div class="panel-heading" style="text-align: left">
          <b>電子公告張貼</b>
        </div>
        <div class="panel-body panel-height">
          <form
            class="form-horizontal form-inline"
            name="form1"
            id="form1"
            method="post"
            enctype="multipart/form-data"
          >
            <input type="hidden" id="op_mode" name="op_mode" value="create" />
            <table class="table table-bordered" id="table1">
              <tbody>
                <tr>
                  <td class="col-md-2 td1 text-center">公告單位</td>
                  <td class="col-md-4 text-center">
                    <div class="form-group">
                      <div class="row">
                        <div class="col-md-12" id="doc_from">資訊工程學系</div>
                      </div>
                    </div>
                  </td>
                  <td class="col-md-2 td1 text-center">聯絡人及分機</td>
                  <td class="col-md-4 text-center">
                    <select
                      id="doc_username"
                      name="doc_username"
                      class="form-control"
                    >
                      <option value="">請選擇</option>
                      <option value="8411">徐美麗 #8411</option>
                      <option value="8412">王小明 #8412</option>
                      <option value="8413">陳大同 #8413</option>
                      <option value="8414">李愛眉 #8414</option>
                    </select>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告類型</td>
                  <td class="col-md-10 div_texbox" colspan="3">
                    <span
                      ><input type="radio" value="1" name="doc_type" />
                      演講</span
                    >
                    <span
                      ><input type="radio" value="2" name="doc_type" />
                      研討會</span
                    >
                    <span
                      ><input type="radio" value="3" name="doc_type" />
                      徵才</span
                    >
                    <span
                      ><input type="radio" value="4" name="doc_type" />
                      招生相關資訊</span
                    >
                    <span
                      ><input type="radio" value="5" name="doc_type" />
                      獎助學金</span
                    >
                    <span
                      ><input type="radio" value="9" name="doc_type" />
                      其他</span
                    >
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告對象</td>
                  <td class="col-md-10" colspan="3" id="doc_to">
                    <span
                      ><input
                        type="checkbox"
                        name="doc_to[]"
                        value="1"
                        class="checkbox-inline"
                      />
                      本校教職員
                    </span>
                    <span
                      ><input
                        type="checkbox"
                        name="doc_to[]"
                        value="2"
                        class="checkbox-inline"
                      />
                      學校首頁
                    </span>
                    <span
                      ><input
                        type="checkbox"
                        name="doc_to[]"
                        value="6"
                        class="checkbox-inline"
                      />
                      學生專區
                    </span>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告標題</td>
                  <td class="col-md-10" colspan="3">
                    <input
                      class="form-control"
                      type="text"
                      size="50"
                      name="doc_title"
                      id="doc_title"
                    />
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告內容</td>
                  <td class="col-md-10" colspan="3">
                    <textarea
                      style="font-size: 10pt"
                      name="doc_detail"
                      id="doc_detail"
                      rows="7"
                      cols="75"
                      class="form-control"
                    ></textarea>
                  </td>
                </tr>
                <tr id="div_dept" style="display: none">
                  <td class="col-md-2 td1 text-center">請選擇校內單位<br /></td>
                  <td class="col-md-10" colspan="3">
                    <div class="bg-success">
                      <input type="checkbox" id="select_all_1" value="" />
                      <b>行政單位</b>
                    </div>
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M00校長室"
                    />
                    校長室
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M10副校長室"
                    />
                    副校長室
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M20教務處"
                    />
                    教務處
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M30學生事務處"
                    />
                    學生事務處
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M40總務處"
                    />
                    總務處
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="N10研究發展處"
                    />
                    研究發展處 <br />
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="MJ0進修學院"
                    />
                    進修學院
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="MQ0圖書與資訊處"
                    />
                    圖書與資訊處
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M70秘書室"
                    />
                    秘書室
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M80人事室"
                    />
                    人事室
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d1"
                      value="M90主計室"
                    />
                    主計室
                    <div class="bg-warning">
                      <input type="checkbox" id="select_all_2" value="" />
                      <b>學術單位</b>
                    </div>
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="400文學院"
                    />
                    文學院
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="410英語學系"
                    />
                    英語學系
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="420國文學系"
                    />
                    國文學系
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="430地理學系"
                    />
                    地理學系
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="440"
                    />
                    美術學系 <br />
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="500"
                    />
                    工學院
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="510機電工程學系"
                    />
                    機電工程學系
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="520電機工程學系"
                    />
                    電機工程學系
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="530電子工程學系"
                    />
                    電子工程學系
                    <input
                      type="checkbox"
                      name="dept[]"
                      class="d2"
                      value="540資訊工程學系"
                    />
                    資訊工程學系
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">附檔</td>
                  <td class="col-md-10" colspan="3">
                    <div class="col-md-12">
                      <div class="form-group" id="div_upload">
                        <div>
                          <button
                            type="button"
                            class="btn btn-danger btn-xs"
                            data-placement="right"
                            title="移除"
                          >
                            <i class="fa fa-times" aria-hidden="true"></i>
                          </button>
                          <input
                            type="file"
                            name="doc_upload[]"
                            style="display: inline-block"
                          />
                        </div>
                      </div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-12 text-center" colspan="4">
                    <button
                      type="button"
                      class="btn btn-success"
                      name="btn_append"
                      id="btn_append"
                    >
                      <i class="fa fa-plus"></i> 新增附檔
                    </button>
                    <button
                      type="button"
                      class="btn btn-success"
                      name="btn_css"
                      id="btn_css"
                    >
                      <i class="fa fa-pencil-alt"></i> 變更字體大小
                    </button>
                    <button
                      type="button"
                      class="btn btn-primary"
                      name="btn_show"
                      id="btn_show"
                    >
                      <i class="fa fa-eye"></i> 顯示表單內容
                    </button>

                    <button
                      type="reset"
                      class="btn btn-warning"
                      name="btn_reset"
                      id="btn_reset"
                    >
                      <i class="fa fa-trash-restore"></i> 清除重填
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>

            <table
              class="table table-bordered"
              id="table2"
              style="display: none"
            >
              <tbody>
                <tr>
                  <td class="col-md-2 td1 text-center">公告單位</td>
                  <td class="col-md-4 text-center">
                    <div id="doc_from_s"></div>
                  </td>
                  <td class="col-md-2 td1 text-center">聯絡人及分機</td>
                  <td class="col-md-4 text-center">
                    <div id="doc_username_s"></div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告類型</td>
                  <td class="col-md-10 div_texbox" colspan="3">
                    <div id="doc_type_s"></div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告對象</td>
                  <td class="col-md-10" colspan="3">
                    <div id="doc_to_s"></div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告標題</td>
                  <td class="col-md-10" colspan="3">
                    <div id="doc_title_s"></div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">公告內容</td>
                  <td class="col-md-10" colspan="3">
                    <div id="doc_detail_s"></div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">請選擇校內單位<br /></td>
                  <td class="col-md-10" colspan="3">
                    <div id="doc_dept_s"></div>
                  </td>
                </tr>
                <tr>
                  <td class="col-md-2 td1 text-center">附檔</td>
                  <td class="col-md-10" colspan="3">
                    <div class="col-md-12">
                      <div id="doc_upload_s"></div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
